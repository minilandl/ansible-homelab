---

- name: Remove Existing K8s List
  ansible.builtin.shell: sudo rm -rf /etc/apt/sources.list.d/*k8s*.sources

- name: Remove Existing Docker List
  ansible.builtin.shell: sudo rm -rf /etc/apt/sources.list.d/*docker*.sources


- name: Remove Existing Docker  Directory (if it exists)
  ansible.builtin.shell: sudo rm -rf /etc/apt/keyrings/kubernetes-apt-keyring.gpg


- name: Prepare keyrings directory and update permissions
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Check if Kubernetes GPG key file exists
  ansible.builtin.stat:
    path: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  register: k8sgpg_file


- name: Download Kubernetes GPG key securely
  ansible.builtin.shell: curl -fsSL https://pkgs.k8s.io/core:/stable:/{{k8s_version}}/deb/Release.key | sudo gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  when: not k8sgpg_file.stat.exists

- name: Add Kubernetes repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/{{ k8s_version }}/deb/ /"
    state: present

- name: Install required packages
  apt:
   name:
    - curl
    - gnupg2
    - apt-transport-https
    - ca-certificates
   state: present
   update_cache: yes

- name: "Gathering facts"
  ansible.builtin.setup:
  when: ansible_facts|default({}) == {}

- name: "Update apt cache (Debian Family)"
  become: true
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Hold kubelet, kubeadm, kubectl packages
  ansible.builtin.command:
    cmd: sudo apt-mark unhold kubelet kubeadm kubectl    
