---
- name: add docker gpg key
  ansible.builtin.shell: curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc

- name: Install kubeadm, kubelet, kubectl
  ansible.builtin.apt:
    name:
      - docker-ce
      - containerd.io
    state: present
    update_cache: yes
