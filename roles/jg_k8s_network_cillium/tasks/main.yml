    - name: Add Cilium helm repository
      kubernetes.core.helm_repository:
         name: cilium 
         repo_url: https://helm.cilium.io/


    - name: Install Cilium CNI via Helm
      kubernetes.core.helm:
       name: cilium
       chart_ref: cilium/cilium
       chart_version: 1.19.3
       release_namespace: kube-system
       create_namespace: true
       wait: true
       values:
         bgpControlPlane:
           enabled: true
         #tunnel: disabled
         routingMode: native
         autoDirectNodeRoutes: true
         ipv4NativeRoutingCIDR: "10.42.0.0/16"
         ipam:
           operator:
             clusterPoolIPv4PodCIDRList: ["10.42.0.0/16"]
             kubeProxyReplacement: true
             k8sServiceHost: "k8smaster1.jaspergreenhill.com"  # Ansible will dynamically inject this variable
             k8sServicePort: 6443
             loadBalancer:
              mode: dsr
             ipv4:
               enabled: true
             prometheus:
               enabled: true
             operator:
               prometheus: 
                 enabled: true
             hubble:
              enabled: true
             metrics:
              enabled:
                - dns
                - drop
                - tcp
                - flow
                - port-distribution
                - icmp
                - http

    - name: Install Cilium BGP Peering Policy
      kubernetes.core.helm:
        name: cilium
        chart_ref: cilium/cilium
        release_namespace: kube-system
        update_repo_cache: yes 
        values:
         extraObjects:
           - apiVersion: cilium.io/v2alpha1
             kind: CiliumBGPPeeringPolicy
             metadata:
               name: 00-bgp-peering-policy
             spec: # CiliumBGPPeeringPolicySpec
               nodeSelector:
                 matchLabels:
                  kubernetes.io/hostname: "{{cilium_service_host}}"
               virtualRouters: # []CiliumBGPVirtualRouter
                 - localASN: 65090
                   exportPodCIDR: false
                   serviceSelector:
                      matchLabels:
                        exposedExternal: "yes"
                   neighbors: # []CiliumBGPNeighbor
                     - peerAddress: "10.20.0.1/32"
                       peerASN: 65000
                       eBGPMultihopTTL: 10
                       connectRetryTimeSeconds: 120
                       holdTimeSeconds: 90
                       keepAliveTimeSeconds: 30
                       gracefulRestart:
                         enabled: true
                         restartTimeSeconds: 120
