---

- name: Create Join Command and Token to Join Nodes
  ansible.builtin.shell: "kubeadm token create --print-join-command" 
  register: join_command_output

- name: generate certificate key for use with join_command later
  ansible.builtin.shell: "kubeadm init phase upload-certs --upload-certs"
  register: certificate_key_output
  become: true

- name: save join command for other hosts to access them
  ansible.builtin.set_fact:
    join_command: "{{ hostvars['jg-k8smaster1.jaspergreenhill.com']['join_command_output'].stdout }}"
    certificate_key: "{{ hostvars['jg-k8smaster1.jaspergreenhill.com']['certificate_key_output'].stdout_lines[-1] }}"




  
