server {
     listen 443 ssl ;
     listen [::]:443 ssl ;
     server_name dispatcharr.jaspergreenhill.com;

    ## The default `client_max_body_size` is 1M, this might not be enough for some posters, etc.
    client_max_body_size 20M;

    # use a variable to store the upstream proxy
    # in this example we are using a hostname which is resolved via DNS
    # (if you aren't using DNS remove the resolver line and change the variable to point to an IP address e.g `set $jellyfin 127.0.0.1`)

    ssl_certificate /data/certs2/jaspergreenhill.com_ecc/fullchain.cer;
    ssl_certificate_key /data/certs2/jaspergreenhill.com_ecc/jaspergreenhill.com.key;
    #ssl_trusted_certificate /data/certs2//chain.pem;
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 60m;
    ssl_prefer_server_ciphers on;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;

  location /{
    proxy_pass         http://10.0.40.6:9191;
    proxy_pass_request_headers on;
	proxy_set_header Host $host;
	proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
	proxy_http_version 1.1;
        # Disable buffering when the nginx proxy gets very resource heavy upon streaming
        proxy_buffering off;
	proxy_connect_timeout       300;
	proxy_send_timeout          300;
	proxy_read_timeout          300;
	send_timeout                300;

}

location /signalr {
    proxy_pass http://10.0.40.6:9191/signalr;
    proxy_set_header Upgrade $http_upgrade;
      proxy_cache off;
     # WebSockets were implemented after http/1.0
      proxy_http_version 1.1;

      # Configuration for ServerSentEvents
      proxy_buffering off;

      # Configuration for LongPolling or if your KeepAliveInterval is longer than 60 seconds
      proxy_read_timeout 100s;

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;}

location /api {
  auth_request off;
  proxy_pass  http://10.0.40.6:9191/dispatcharr/api;
}




  }

