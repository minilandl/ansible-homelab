server {
     listen 443 ssl ;
     listen [::]:443 ssl ;
     server_name seedsyncarr.jaspergreenhill.com;
    
    ## The default `client_max_body_size` is 1M, this might not be enough for some posters, etc.
    client_max_body_size 20M;

    # use a variable to store the upstream proxy
    # in this example we are using a hostname which is resolved via DNS
    # (if you aren't using DNS remove the resolver line and change the variable to point to an IP address e.g `set $jellyfin 127.0.0.1`)
    
    ssl_certificate /data/certs2/jaspergreenhill.com_ecc/fullchain.cer;
    ssl_certificate_key /data/certs2/jaspergreenhill.com_ecc/jaspergreenhill.com.key;
    #ssl_trusted_certificate /data/certs2//chain.pem;
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 60m;
    ssl_prefer_server_ciphers on;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5; 

    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    
    proxy_connect_timeout 90s;
    proxy_send_timeout    90s;
    proxy_read_timeout    90s;

 
  location / {
        # Forward requests to SeedSync (change localhost if on a different docker network)
        proxy_pass http://10.0.40.6:8800;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (CRITICAL for SeedSync live updates)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Disable buffering to ensure real-time log streaming works seamlessly
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s; 




}
       }
