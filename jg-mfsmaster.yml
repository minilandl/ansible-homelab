---
- hosts: docker
- hosts: mfsmaster
  become: yes
  roles:
    - roles/jg_docker_netiso
    - roles/jg_network
    - roles/jg_moosefs_master
  vars:
  tasks:
  - name: System details
    debug: msg="{{ item }}"
    with_items:
    - "{{ ansible_distribution }}"
    - "{{ ansible_interfaces }}"
    - "{{ ansible_distribution_version }}"
    - "{{ ansible_distribution_major_version }}"
    - "{{ ansible_distribution_release }}"
    - "{{ansible_processor}}"
    - "{{ ansible_default_ipv4.address }}"
