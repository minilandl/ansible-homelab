---
- name: Configure Master Nodes
  hosts: k8smaster
  become: yes
  roles:
    - roles/jg_update_packages
    - roles/jg_k8s_packages
    - roles/jg_k8s_containerd
    - roles/jg_k8s_disableswap
    - roles/jg_k8s_kubecfg
    - roles/jg_k8s_master_joincommand
    - roles/jg_k8s_modules
    - roles/jg_k8s_master
    - roles/jg_k8s_master_kubeadm

- name: Configure And Install Helm
  hosts: k8smaster
  become: yes
  roles:
    - roles/jg_k8s_master_helm

- name: Configure Network
  hosts: k8smaster
  become: yes
  roles:
    - roles/jg_k8s_network_cillium

- name: Configure Worker Nodes
  hosts: k8s
  become: yes
  roles:
    - roles/jg_update_packages
    - roles/jg_k8s_packages
    - roles/jg_k8s_containerd
    - roles/jg_k8s_disableswap
    - roles/jg_k8s_kubecfg
    - roles/jg_k8s_modules

- hosts: k8sall
  tasks:
    - name: save join command for other hosts to access them
      ansible.builtin.set_fact:
        join_command: "{{ hostvars['jg-k8smaster1.jaspergreenhill.com']['join_command_output'].stdout }}"
        certificate_key: "{{ hostvars['jg-k8smaster1.jaspergreenhill.com']['certificate_key_output'].stdout_lines[-1] }}"

- hosts: k8smaster
  tasks:
    - name: Check if node is already joined
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubeconfig_file

    - name: setup other control plane nodes 
      ansible.builtin.shell: "{{ join_command }} --control-plane --certificate-key {{ certificate_key }}"
      when: not kubeconfig_file.stat.exists
      become: true

- hosts: k8s
  tasks:
    - name: Check if node is already joined
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubeconfig_file

    - name: setup worker nodes
      ansible.builtin.shell: "{{ join_command }}"
      when: not kubeconfig_file.stat.exists
      become: true
- name: Install Argo
  hosts: k8smaster
  become: yes
  roles:
    - roles/jg_k8s_argocd
  vars:
    fqdn: jaspergreenhill.com
    user_jasper: jasper
    dnsserver: 10.0.40.3
    domainname: jg-dns.jaspergreenhill.com
